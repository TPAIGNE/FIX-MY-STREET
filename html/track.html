<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Report - FixMyStreet Ghana</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .track-container {
            max-width: 700px;
            margin: 2rem auto;
        }
        
        .search-form {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body data-page="track">
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <div class="logo-icon">📍</div>
                    <span>FixMyStreet</span>
                </a>
                <button class="mobile-menu-btn">☰</button>
                <div class="nav-links">
                    <a href="dashboard.html">View Reports</a>
                    <a href="track.html">Track Report</a>
                    <a href="admin/dashboard.html">Admin</a>
                    <a href="report.html" class="btn btn-accent">Report Issue</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="track-container">
                <h1 class="section-title">Track Your Report</h1>
                <p class="section-subtitle">Enter your report ID to track its status</p>

                <form class="search-form card" style="margin: 2rem 0;">
                    <div class="form-group">
                        <label for="report_id">Report ID</label>
                        <input type="text" id="report_id" name="report_id" placeholder="e.g., FMS8K2N4" style="text-transform: uppercase;">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Search Report</button>
                </form>

                <div class="report-details"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 FixMyStreet Ghana. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
