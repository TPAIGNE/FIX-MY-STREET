<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FixMyStreet Ghana</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .view-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        
        .view-toggle button {
            padding: 0.5rem 1rem;
            border: none;
            background-color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .reports-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body data-page="dashboard">
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <div class="logo-icon">📍</div>
                    <span>FixMyStreet</span>
                </a>
                <button class="mobile-menu-btn">☰</button>
                <div class="nav-links">
                    <a href="dashboard.html">View Reports</a>
                    <a href="track.html">Track Report</a>
                    <a href="admin/dashboard.html">Admin</a>
                    <a href="report.html" class="btn btn-accent">Report Issue</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container" style="padding-top: 2rem;">
            <div class="dashboard-header">
                <div>
                    <h1 class="section-title">Public Reports Dashboard</h1>
                    <p class="section-subtitle">View infrastructure reports from across Ghana</p>
                </div>
                <div class="view-toggle">
                    <button data-view="grid" style="background-color: var(--primary); color: white;">📊 Grid</button>
                    <button data-view="list">📝 List</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <h3 style="margin-bottom: 1rem;">Filter Reports <span class="active-filter-count"></span></h3>
                <div class="filter-row">
                    <div class="form-group">
                        <label for="regionFilter">Region</label>
                        <select id="regionFilter">
                            <option value="">All Regions</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="categoryFilter">Category</label>
                        <select id="categoryFilter">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="statusFilter">Status</label>
                        <select id="statusFilter">
                            <option value="">All Statuses</option>
                            <option value="pending">Pending</option>
                            <option value="in_progress">In Progress</option>
                            <option value="resolved">Resolved</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-outline btn-clear-filters">Clear Filters</button>
                </div>
            </div>

            <!-- Reports -->
            <div class="reports-container"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 FixMyStreet Ghana. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
